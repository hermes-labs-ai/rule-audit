name: CI

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run tests with coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: pytest --cov=rule_audit --cov-report=term-missing --cov-fail-under=70

  lint:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy
        run: |
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: mypy rule_audit --ignore-missing-imports
        continue-on-error: true  # warn but don't fail CI on type errors during alpha

  audit-samples:
    name: Audit sample prompts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rule-audit
        run: pip install -e .

      - name: Audit all sample prompts
        # Sample prompts are deliberately imperfect — they exercise the detectors.
        # `|| true` prevents the exit-2 (HIGH/CRITICAL risk) from failing CI.
        # The purpose of this job is to smoke-test that the CLI runs on real inputs.
        run: |
          for f in samples/*.txt; do
            echo "=== Auditing: $f ==="
            python -m rule_audit --file "$f" --format summary || true
            echo ""
          done

      - name: Run benchmark tests
        run: |
          pip install pytest
          pytest tests/test_benchmark.py -v --tb=short
